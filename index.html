<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Almoxarifado</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="cabecalho">
        <h1>Almoxarifado</h1>
    </header>
    <main>
        <section class="dashboard">
            <div class="card-dashboard">
                <span class="card-label">Total de Materiais</span>
                <span class="card-valor" id="total-itens">0</span>
            </div>
            <div class="card-alerta">
                <span class="card-label">Estoque crítico</span>
                <span class="card-valor" id="total-criticos">0</span>
            </div>
        </section>

        <!-- buscar materiais -->
        <section class="secao-busca">
            <input type="search" id="input-busca" placeholder="Buscar materiais...">
        </section>

        <!-- insere o material (nome e quantidade) -->
        <section class="cadastro">
            <h2>Cadastro de Materiais</h2>
            <form id="form-cadastro">
                <div class="campo-nome">
                    <label for="input-nome">Nome do material: </label>
                    <input type="text" id="input-nome" name="nome" required>
                </div>
                <div class="campo-quantidade">
                    <label for="input-quantidade">Quantidade: </label>
                    <input type="number" id="input-quantidade" name="quantidade" required min="1">
                </div>
                <div class="botao-cadastro">
                    <button type="submit" id="btn-cadastrar">Cadastrar</button>
                </div>
            </form>
        </section>
        <!-- lista dos materiais cadastrados -->
        <section class="secao-lista">
            <h2>Lista de Materiais</h2>
            <table id="lista-materiais">
                <thead>
                    <tr>
                        <th>Nome do Material</th>
                        <th>Quantidade</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="corpo-tabela">
                    <!-- exibe os materiais cadastrados -->
                </tbody>
            </table>
        </section>
    </main>
    <footer class="rodape">
        <p>Saúde | SENAC - Zona Norte</p>
        <p><em>Desenvolvido por <a href="https://linkedin.com/in/eduardakauane" target="_blank">Eduarda Kauane</a></em></p>
    </footer>
    <script src="main.js"></script>
</body>
</html>
